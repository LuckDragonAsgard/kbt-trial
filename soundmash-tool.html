<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMash - KBT Question Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Londrina+Solid:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Londrina Solid', cursive;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #47B5D0 0%, #3a95ad 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* Upload Zone */
        .upload-section {
            background: #252545;
            border: 2px dashed #47B5D0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .upload-section:hover {
            border-color: #3a95ad;
            background: #2a2a50;
        }

        .upload-section.dragover {
            background: rgba(71, 181, 208, 0.1);
            border-color: #47B5D0;
            transform: scale(1.02);
        }

        #fileInput {
            display: none;
        }

        .upload-text {
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .upload-hint {
            font-size: 0.95em;
            opacity: 0.7;
            margin-top: 10px;
        }

        /* Clips Section */
        .clips-section {
            margin-bottom: 30px;
        }

        .clips-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #47B5D0;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax
            (350px, 1fr));
            gap: 20px;
        }

        .clip-card {
            background: #252545;
            border: 2px solid #47B5D0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .clip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(71, 181, 208, 0.3);
        }

        .clip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .clip-number {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5em;
            color: #47B5D0;
        }

        .clip-delete {
            background: rgba(255, 87, 87, 0.8);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            transition: all 0.3s ease;
        }

        .clip-delete:hover {
            background: rgba(255, 87, 87, 1);
            transform: scale(1.05);
        }

        .waveform-container {
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            height: 120px;
        }

        .waveform-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: col-resize;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #47B5D0;
            border-radius: 6px;
            color: #fff;
            font-family: 'Londrina Solid', cursive;
            font-size: 0.95em;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #3a95ad;
            box-shadow: 0 0 10px rgba(71, 181, 208, 0.3);
        }

        .trim-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* Mode Selector */
        .mode-section {
            background: #252545;
            border: 2px solid #47B5D0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .mode-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #47B5D0;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .mode-btn {
            padding: 15px;
            border: 2px solid #47B5D0;
            background: transparent;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 1em;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-btn:hover {
            background: rgba(71, 181, 208, 0.1);
            transform: scale(1.05);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #47B5D0 0%, #3a95ad 100%);
            border-color: #fff;
            font-weight: 700;
        }

        .mode-description {
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Action Buttons */
        .action-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-family: 'Londrina Solid', cursive;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #47B5D0 0%, #3a95ad 100%);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(71, 181, 208, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .results-section {
            background: #252545;
            border: 2px solid #47B5D0;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .results-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8em;
            margin-bottom: 25px;
            color: #47B5D0;
        }

        .audio-player {
            margin-bottom: 30px;
        }

        .player-label {
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .preview-btn {
            background: linear-gradient(135deg, #47B5D0 0%, #3a95ad 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .preview-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(71, 181, 208, 0.3);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
            margin-top: 25px;
        }

        .image-container {
            background: #1a1a2e;
            border: 1px solid #47B5D0;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-label {
            background: rgba(71, 181, 208, 0.2);
            padding: 10px;
            text-align: center;
            font-weight: 700;
            border-bottom: 1px solid #47B5D0;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .download-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .btn-download {
            background: rgba(71, 181, 208, 0.2);
            border: 2px solid #47B5D0;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Londrina Solid', cursive;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            background: rgba(71, 181, 208, 0.4);
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(71, 181, 208, 0.3);
            border-radius: 50%;
            border-top-color: #47B5D0;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 87, 87, 0.1);
            border: 2px solid rgba(255, 87, 87, 0.5);
            color: #ff5757;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid rgba(76, 175, 80, 0.5);
            color: #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .clips-grid {
                grid-template-columns: 1fr;
            }

            .action-section {
                grid-template-columns: 1fr;
            }

            .images-grid {
                grid-template-columns: 1fr;
            }

            .mode-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
