<html lang="en">

<style>

body {

                    linear-gradient(90deg,rgba(200,200,200,.18) 1px,transparent 1px);

.container { max-width: 1020px; margin: 0 auto; }

.drop-zone:hover,.drop-zone.over { border-color:#9c27b0; background:#f3e5f5; }

<script>
// 芒聰聙芒聰聙芒聰聙 Globals 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
let raw1=null, raw2=null, orig1=null, orig2=null, slideA=null, slideB=null, apiReady=false;
const MODEL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/model';
const PURPLE='#9c27b0';
const SW=1920, SH=1080;

// 芒聰聙芒聰聙芒聰聙 Drop zones 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function setupZone(zoneId,fileId,cardId,slot){
  const z=document.getElementById(zoneId),f=document.getElementById(fileId),c=document.getElementById(cardId);
  z.onclick=()=>f.click();
  z.ondragover=e=>{e.preventDefault();z.classList.add('over');};
  z.ondragleave=()=>z.classList.remove('over');
  z.ondrop=e=>{e.preventDefault();z.classList.remove('over');if(e.dataTransfer.files[0])read(e.dataTransfer.files[0]);};
  f.onchange=()=>{if(f.files[0])read(f.files[0]);};
  function read(file){
    const r=new FileReader();
    r.onload=e=>{
      const url=e.target.result;
      if(slot===1)raw1=url;else raw2=url;
      z.innerHTML='';
      const img=document.createElement('img');img.src=url;z.appendChild(img);
      c.classList.add('ok');
      const el=new Image();el.src=url;
      if(slot===1)orig1=el;else orig2=el;
      checkReady();
    };
    r.readAsDataURL(file);
  }
}
setupZone('zone1','file1','card1',1);
setupZone('zone2','file2','card2',2);
function checkReady(){document.getElementById('btnGen').disabled=!(raw1&&raw2);}

// 芒聰聙芒聰聙芒聰聙 face-api 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function loadApi(){
  if(apiReady)return;
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL),
    faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL),
  ]);
  apiReady=true;
}
async function getLandmarks(imgEl){
  await new Promise(r=>{if(imgEl.complete&&imgEl.naturalWidth>0)r();else imgEl.onload=r;});
  const opts=new faceapi.TinyFaceDetectorOptions({inputSize:416,scoreThreshold:0.3});
  const res=await faceapi.detectSingleFace(imgEl,opts).withFaceLandmarks(true);
  return res?res.landmarks:null;
}

// 芒聰聙芒聰聙芒聰聙 Background removal 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function rembg(b64){
  const r=await fetch('/api/fal-rembg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});
  const d=await r.json();
  if(!r.ok||d.error)throw new Error(d.error||'Background removal failed');
  return d.url;
}
function loadImg(src){
  return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=src;});
}

// 芒聰聙芒聰聙芒聰聙 Eye alignment transform 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function eyeCenter(pts){return{x:pts.reduce((s,p)=>s+p.x,0)/pts.length,y:pts.reduce((s,p)=>s+p.y,0)/pts.length};}
function computeTransform(lm1,lm2){
  const L1=eyeCenter(lm1.getLeftEye()),R1=eyeCenter(lm1.getRightEye());
  const L2=eyeCenter(lm2.getLeftEye()),R2=eyeCenter(lm2.getRightEye());
  const rot=Math.atan2(R1.y-L1.y,R1.x-L1.x)-Math.atan2(R2.y-L2.y,R2.x-L2.x);
  const sc=Math.hypot(R1.x-L1.x,R1.y-L1.y)/Math.hypot(R2.x-L2.x,R2.y-L2.y);
  const mid1={x:(L1.x+R1.x)/2,y:(L1.y+R1.y)/2};
  const mid2={x:(L2.x+R2.x)/2,y:(L2.y+R2.y)/2};
  const cos=Math.cos(rot),sin=Math.sin(rot);
  return{sc,cos,sin,tx:mid1.x-sc*(mid2.x*cos-mid2.y*sin),ty:mid1.y-sc*(mid2.x*sin+mid2.y*cos)};
}
function alignFace(img,t,W,H){
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.setTransform(t.sc*t.cos,t.sc*t.sin,-t.sc*t.sin,t.sc*t.cos,t.tx,t.ty);
  ctx.drawImage(img,0,0,img.naturalWidth,img.naturalHeight);
  ctx.setTransform(1,0,0,1,0,0);
  return c;
}

// 芒聰聙芒聰聙芒聰聙 Feature-swap morph 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
// Left half = Face 1 (one eye + nose side)
// Right half = Face 2 aligned (other eye + mouth)
// Feathered vertical split at nose midline
function buildFeatureSwap(cut1,cut2,lm1,transform,W,H){
  // Align Face2 to Face1's coordinate space
  const aligned2=alignFace(cut2,transform,W,H);

  // Find nose midline X from Face1 landmarks (natural split point)
  const nosePoints=lm1.getNose();
  const splitX=Math.round(nosePoints.reduce((s,p)=>s+p.x,0)/nosePoints.length);
  const blendHalf=36; // pixels of feather on each side of the split

  // Get pixel data from both faces
  const tmp1=document.createElement('canvas');tmp1.width=W;tmp1.height=H;
  tmp1.getContext('2d').drawImage(cut1,0,0,W,H);
  const d1=tmp1.getContext('2d').getImageData(0,0,W,H).data;
  const d2=aligned2.getContext('2d').getImageData(0,0,W,H).data;

  // Build composite pixel-by-pixel
  const out=document.createElement('canvas');out.width=W;out.height=H;
  const octx=out.getContext('2d');
  const img=octx.createImageData(W,H);
  const od=img.data;

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      const a1=d1[i+3],a2=d2[i+3];

      // Weight for Face1 (1=full Face1, 0=full Face2)
      let w1;
      if(x<=splitX-blendHalf) w1=1.0;
      else if(x>=splitX+blendHalf) w1=0.0;
      else{
        // Smooth cosine blend in the transition zone
        const t=(x-(splitX-blendHalf))/(blendHalf*2);
        w1=0.5*(1+Math.cos(t*Math.PI));
      }
      const w2=1-w1;

      const hasF1=a1>0,hasF2=a2>0;
      if(!hasF1&&!hasF2) continue; // fully transparent

      let r,g,b,a;
      if(hasF1&&hasF2){
        // Both present: blend RGB and use the stronger alpha side
        r=Math.round(d1[i]*w1+d2[i]*w2);
        g=Math.round(d1[i+1]*w1+d2[i+1]*w2);
        b=Math.round(d1[i+2]*w1+d2[i+2]*w2);
        a=Math.round(a1*w1+a2*w2);
      } else if(hasF1){
        r=d1[i];g=d1[i+1];b=d1[i+2];a=Math.round(a1*w1);
      } else {
        r=d2[i];g=d2[i+1];b=d2[i+2];a=Math.round(a2*w2);
      }
      od[i]=r;od[i+1]=g;od[i+2]=b;od[i+3]=a;
    }
  }
  octx.putImageData(img,0,0);
  return out;
}

// 芒聰聙芒聰聙芒聰聙 Sticker: white border + drop shadow on transparent PNG 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function sticker(src,border=15){
  const sW=src.width,sH=src.height,pad=border+40;
  const W=sW+pad*2,H=sH+pad*2;
  // White silhouette
  const sil=document.createElement('canvas');sil.width=sW;sil.height=sH;
  const sx=sil.getContext('2d');
  sx.drawImage(src,0,0,sW,sH);
  sx.globalCompositeOperation='source-in';
  sx.fillStyle='white';sx.fillRect(0,0,sW,sH);
  // Stamp at 36 angles to create thick white outline
  const brd=document.createElement('canvas');brd.width=W;brd.height=H;
  const bx=brd.getContext('2d');
  for(let i=0;i<36;i++){
    const a=(i/36)*Math.PI*2;
    bx.drawImage(sil,pad+Math.cos(a)*border,pad+Math.sin(a)*border);
  }
  bx.drawImage(src,pad,pad,sW,sH);
  // Drop shadow
  const fin=document.createElement('canvas');fin.width=W;fin.height=H;
  const fx=fin.getContext('2d');
  fx.shadowColor='rgba(0,0,0,0.55)';
  fx.shadowBlur=24;fx.shadowOffsetX=10;fx.shadowOffsetY=16;
  fx.drawImage(brd,0,0);
  return fin;
}

function drawBg(ctx){
  ctx.fillStyle='#f7f7f7';ctx.fillRect(0,0,SW,SH);
  ctx.strokeStyle='rgba(180,180,180,0.2)';ctx.lineWidth=1;
  for(let x=0;x<=SW;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,SH);ctx.stroke();}
  for(let y=0;y<=SH;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(SW,y);ctx.stroke();}
}
function fit(sw,sh,mw,mh){const s=Math.min(mw/sw,mh/sh,1);return{w:Math.round(sw*s),h:Math.round(sh*s)};}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function makeSlideA(stkMorph){
  const c=document.createElement('canvas');c.width=SW;c.height=SH;
  const ctx=c.getContext('2d');
  drawBg(ctx);
  ctx.font='bold 84px "Bowlby One SC",cursive';
  ctx.fillStyle=PURPLE;ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Facemorph.',SW/2,42);
  const{w,h}=fit(stkMorph.width,stkMorph.height,940,870);
  ctx.drawImage(stkMorph,(SW-w)/2,140+(870-h)/2,w,h);
  return c;
}

function makeSlideB(stk1,stkM,stk2,n1,n2){
  const c=document.createElement('canvas');c.width=SW;c.height=SH;
  const ctx=c.getContext('2d');
  drawBg(ctx);
  ctx.font='bold 84px "Bowlby One SC",cursive';
  ctx.fillStyle=PURPLE;ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Facemorph.',SW/2,42);
  const slots=[{x:24,w:574},{x:658,w:604},{x:1322,w:574}];
  [stk1,stkM,stk2].forEach((f,i)=>{
    const{w,h}=fit(f.width,f.height,slots[i].w,748);
    ctx.drawImage(f,slots[i].x+(slots[i].w-w)/2,146+(748-h)/2,w,h);
  });
  const ans=(n1||'Person 1')+' & '+(n2||'Person 2');
  ctx.font='bold 44px "Bowlby One SC",cursive';ctx.textBaseline='middle';
  const tw=ctx.measureText(ans).width,bw=tw+70,bh=68,bx=(SW-bw)/2,by=936;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.1)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
  ctx.fillStyle='#fff';ctx.strokeStyle=PURPLE;ctx.lineWidth=3;rr(ctx,bx,by,bw,bh,10);ctx.fill();ctx.stroke();ctx.restore();
  ctx.fillStyle=PURPLE;ctx.textAlign='center';ctx.fillText(ans,SW/2,by+bh/2);
  return c;
}

function prog(pct,title,msg,err){
  document.getElementById('progBox').classList.add('on');
  document.getElementById('progFill').style.width=pct+'%';
  if(title!==undefined)document.getElementById('progTitle').textContent=title;

// 芒聰聙芒聰聙芒聰聙 Generate 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
document.getElementById('btnGen').addEventListener('click',async()=>{
  document.getElementById('btnGen').disabled=true;
  document.getElementById('previewBox').classList.remove('on');
  document.getElementById('errMsg').textContent='';
  slideA=null;slideB=null;
  try{
    prog(5,'Loading face landmark model芒聙娄','');
    await loadApi();

    prog(14,'Detecting landmarks & removing backgrounds芒聙娄','Running in parallel芒聙娄');
    const[[lm1,lm2],[url1,url2]]=await Promise.all([
      Promise.all([getLandmarks(orig1),getLandmarks(orig2)]),
      Promise.all([rembg(raw1),rembg(raw2)]),
    ]);
    if(!lm1||!lm2) throw new Error('Face not detected in one or both photos. Use a clear forward-facing headshot.');

    prog(56,'Loading cutouts芒聙娄','');
    const[cut1,cut2]=await Promise.all([loadImg(url1),loadImg(url2)]);

    prog(65,'Aligning faces芒聙娄','Matching eye positions芒聙娄');
    const W=cut1.naturalWidth,H=cut1.naturalHeight;
    const transform=computeTransform(lm1,lm2);

    prog(74,'Building feature swap芒聙娄','Left eye+nose from Face 1 | Right eye+mouth from Face 2芒聙娄');
    const morphC=buildFeatureSwap(cut1,cut2,lm1,transform,W,H);

    prog(86,'Applying white border & drop shadow芒聙娄','');
    const c1c=document.createElement('canvas');c1c.width=W;c1c.height=H;c1c.getContext('2d').drawImage(cut1,0,0);
    const c2c=document.createElement('canvas');c2c.width=cut2.naturalWidth;c2c.height=cut2.naturalHeight;c2c.getContext('2d').drawImage(cut2,0,0);
    const sM=sticker(morphC,16),s1=sticker(c1c,12),s2=sticker(c2c,12);

    prog(94,'Rendering 1920脙聴1080 slides芒聙娄','');
    const n1=document.getElementById('name1').value.trim();
    const n2=document.getElementById('name2').value.trim();
    slideA=makeSlideA(sM);
    slideB=makeSlideB(s1,sM,s2,n1,n2);

    prog(100,'Done! 芒聹聯','Both slides ready.');
    showSlide('A');
    document.getElementById('previewBox').classList.add('on');
  }catch(e){
    console.error(e);
    prog(0,'Error','',e.message||String(e));
  }finally{
    document.getElementById('btnGen').disabled=false;
  }
});

function showSlide(w){
  const src=w==='A'?slideA:slideB;if(!src)return;
  document.getElementById('tabA').classList.toggle('on',w==='A');
  document.getElementById('tabB').classList.toggle('on',w==='B');
  const cv=document.getElementById('cv');cv.width=src.width;cv.height=src.height;
  cv.getContext('2d').drawImage(src,0,0);
}
function dl(w){
  const src=w==='A'?slideA:slideB;if(!src)return;
  const n1=document.getElementById('name1').value.trim()||'Face1';
  const n2=document.getElementById('name2').value.trim()||'Face2';
  const a=document.createElement('a');a.href=src.toDataURL('image/png');
  a.download='FaceMorph_'+w+'_'+n1+'_'+n2+'.png';a.click();
}
async function generateMorphHint(){
  const c1=document.getElementById('name1').value.trim(),c2=document.getElementById('name2').value.trim();
  if(!c1||!c2){alert('Enter both names first!');return;}
  const btn=document.getElementById('aiMorphHintBtn'),panel=document.getElementById('aiMorphPanel');
  btn.disabled=true;btn.textContent='芒聫鲁 Writing clue...';
  try{
    const res=await fetch('/api/ai-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'face-morph-hint',celeb1:c1,celeb2:c2})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    panel.textContent='"'+data.result+'"';panel.style.display='block';
  }catch(err){alert('AI error: '+err.message);}
  finally{btn.disabled=false;btn.textContent='冒聼陇聳 AI Generate Host Clue';}
}
